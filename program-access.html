<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="page.programAccess.metaTitle">Program Access | SYSEM</title>
  <meta name="description" content="Accesso ai programmi SYSEM.">
  <link rel="stylesheet" href="assets/css/style.css?v=20260718c">
</head>
<body data-page="program-access" data-required-role="guest">
<div class="site">
  <header class="site-header">
    <div class="site-header__left">
      <a class="brand" href="/" aria-label="SYSEM home">
        <img src="assets/img/logo.png" alt="Logo SYSEM">
      </a>
      <span class="site-header__menu" id="menu-label"></span>
    </div>
    <div class="nav-container">
      <button class="nav-toggle" id="menu-toggle" aria-label="Apri menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="site-body">
    <div class="content-frame">
      <div class="page-heading">
        <h1 class="page-title" data-i18n="page.programAccess.title">Accesso Programma</h1>
      </div>
      <div class="page-body">
        <div class="auth-grid">
          <article class="auth-card">
            <h2 data-i18n="auth.loginTitle">Accedi al programma</h2>
            <p data-i18n="auth.loginDesc">Inserisci le credenziali per entrare nei download software.</p>
            <form id="login-form" class="auth-form">
              <label for="login-email" data-i18n="auth.loginLabel">Utente</label>
              <input id="login-email" name="email" type="email" list="login-email-list" required placeholder="nome@azienda.it" autocomplete="username" data-i18n="auth.emailPlaceholder">
              <datalist id="login-email-list"></datalist>
              <label for="login-password" data-i18n="auth.passwordLabel">Password</label>
              <input id="login-password" name="password" type="password" required>
              <button type="submit" class="btn-download" data-i18n="auth.signinBtn">Accedi</button>
            </form>
            <p class="auth-hint" data-i18n="auth.authorizedOnly">Solo utenti autorizzati.</p>
            <p id="auth-feedback" class="auth-feedback" aria-live="polite"></p>
          </article>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="changelog-section" aria-label="Registro modifiche">
      <div class="changelog-header">
        <span class="changelog-badge">Modifiche recenti</span>
      </div>
      <div class="changelog-list" id="changelog-list">
        <p class="changelog-loading">Caricamento...</p>
      </div>
    </div>
  </footer>
</div>

<div class="overlay-menu" id="overlay-menu">
  <nav><ul></ul></nav>
</div>

<script src="assets/js/main.js?v=20260718c"></script>
</body>
</html>
