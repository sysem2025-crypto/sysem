<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="0; url=/index.html">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accesso | SYSEM</title>
  <meta name="description" content="Registrazione e accesso alla documentazione SYSEM.">
  <link rel="stylesheet" href="assets/css/style.css?v=20260601">
  <script>
    window.location.replace('/index.html');
  </script>
</head>
<body data-page="access" data-required-role="guest">
  <main class="home">
    <header class="topbar" aria-label="Intestazione sito">
      <a class="brand" href="/" aria-label="SYSEM home">
        <img src="assets/img/logo.png" alt="Logo SYSEM">
      </a>
      <div class="nav-container">
        <button class="nav-toggle" id="menu-toggle" aria-label="Apri menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <div class="overlay-menu" id="overlay-menu">
      <nav>
        <ul></ul>
      </nav>
    </div>

    <section class="hero auth-hero" aria-labelledby="page-title">
      <p>Area riservata</p>
      <h1 id="page-title">Accesso</h1>

      <div class="auth-grid">
        <article class="auth-card" id="login-section">
          <h2>Login</h2>
          <p>Inserisci le credenziali per entrare nell'area riservata.</p>
          <form id="login-form" class="auth-form">
            <label for="login-email">Utente</label>
            <input id="login-email" name="email" type="email" list="login-email-list" required placeholder="nome@azienda.it" autocomplete="username">
            <datalist id="login-email-list"></datalist>
            <label for="login-password">Password</label>
            <input id="login-password" name="password" type="password" required>
            <button type="submit" class="btn-download">Accedi</button>
          </form>
          <p class="auth-hint">Solo utenti autorizzati.</p>
          <p id="auth-feedback" class="auth-feedback" aria-live="polite"></p>
        </article>
      </div>
    </section>
  </main>
  <script src="assets/js/main.js?v=20260601"></script>
</body>
</html>
