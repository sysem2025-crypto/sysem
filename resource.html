<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resource | SYSEM</title>
  <meta name="description" content="Risorse utili e materiali scaricabili.">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body data-page="resource" data-required-role="base">
  <main class="home resource-page">
    <header class="topbar" aria-label="Intestazione sito">
      <a class="brand" href="/" aria-label="SYSEM home">
        <img src="assets/img/logo.png" alt="Logo SYSEM">
      </a>

      <div class="nav-container">
        <button class="nav-toggle" id="menu-toggle" aria-label="Apri menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <div class="overlay-menu" id="overlay-menu">
      <nav><ul></ul></nav>
    </div>

    <section class="hero" aria-labelledby="page-title">
      <p>Learning & Assets</p>
      <h1 id="page-title">Resource</h1>
    </section>

    <section class="resources-container resources-layout" aria-label="Catalogo risorse">
      <aside class="resource-menu-panel">
        <p class="resource-menu-title">Catalogo</p>
        <div class="resource-menu" id="resource-menu" role="tablist" aria-label="Elenco risorse"></div>
      </aside>

      <article class="resource-card resource-detail-panel" id="resource-detail" aria-live="polite">
        <span class="resource-badge" id="resource-detail-badge">--</span>
        <h3 id="resource-detail-title">--</h3>
        <p id="resource-detail-description">Seleziona una risorsa dal menu per visualizzare dettagli e azioni.</p>
        <div class="resource-meta" id="resource-detail-meta" aria-label="Scheda risorsa"></div>
        <div class="dlms-actions" id="resource-detail-actions"></div>
        <div class="dlms-diagnostics" id="resource-diagnostics" aria-live="polite" hidden>
          <p class="diag-title">Indice diagnostico aggiornamenti</p>
          <p class="diag-line">Download manuali: <strong id="manual-download-count">--</strong></p>
          <p class="diag-line">Download automatici: <strong id="auto-download-count">--</strong></p>
          <p class="diag-line diag-updated">Ultimo aggiornamento dati: <strong id="diag-last-update">--</strong></p>
        </div>
      </article>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
