<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="page.resource.metaTitle">Resource | SYSEM</title>
  <meta name="description" content="Risorse utili e materiali scaricabili.">
  <link rel="stylesheet" href="assets/css/style.css?v=20260718c">
</head>

<body data-page="resource" data-required-role="base">
<div class="site">
  <header class="site-header">
    <div class="site-header__left">
      <a class="brand" href="/" aria-label="SYSEM home">
        <img src="assets/img/logo.png" alt="Logo SYSEM">
      </a>
      <span class="site-header__menu" id="menu-label"></span>
    </div>
    <div class="nav-container">
      <button class="nav-toggle" id="menu-toggle" aria-label="Apri menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="site-body">
    <div class="content-frame">
      <div class="page-heading">
        <h1 class="page-title" data-i18n="page.resource.title">Resource</h1>
      </div>
      <div class="page-body">
        <article class="resource-card resource-detail-panel" id="resource-detail" aria-live="polite">
          <div class="resource-select-wrap">
            <select id="resource-select" class="resource-select" aria-label="Seleziona programma da scaricare" data-i18n="resource.selectLabel"></select>
          </div>
          <h3 id="resource-detail-title">--</h3>
          <p id="resource-detail-description" hidden></p>
          <div class="resource-meta" id="resource-detail-meta" aria-label="Scheda risorsa"></div>
          <div class="dlms-actions" id="resource-detail-actions"></div>
          <div class="dlms-diagnostics" id="resource-diagnostics" aria-live="polite" hidden>
            <p class="diag-title" data-i18n="resource.diagnosticsTitle">Indice diagnostico aggiornamenti</p>
            <p class="diag-line diag-inline">
              Manual: <strong id="manual-download-count">--</strong>
              <span class="diag-sep">|</span>
              Auto: <strong id="auto-download-count">--</strong>
              <span class="diag-sep">|</span>
              Agg.: <strong id="diag-last-update">--</strong>
            </p>
          </div>
        </article>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="changelog-section" aria-label="Registro modifiche">
      <div class="changelog-header">
        <span class="changelog-badge">Modifiche recenti</span>
      </div>
      <div class="changelog-list" id="changelog-list">
        <p class="changelog-loading">Caricamento...</p>
      </div>
    </div>
  </footer>
</div>

<div class="overlay-menu" id="overlay-menu">
  <nav><ul></ul></nav>
</div>

<script src="assets/js/main.js?v=20260718c"></script>
</body>
</html>
