name: Deploy to Netsons

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Upload via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          security: loose
          local-dir: './'
          server-dir: './public_html/'
          exclude: |
            **/.git/**
            **/.git*/**
            **/.github/**
            **/README.md
            **/AGGIORNAMENTO_RELEASE_WEB.md
            **/AI_STATUS_BAR_CHANGES.md
            docker-compose.yml
            Dockerfile
            ddns-config.json
            .gitignore
            **/*.py
            **/*.docx
            **/*.pdf
          log-level: verbose
          dangerous-clean-slate: false
