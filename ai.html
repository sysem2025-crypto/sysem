<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="page.ai.metaTitle">AI | SYSEM</title>
  <meta name="description" content="Assistente AI SYSEM per supporto tecnico su utility, normative e diagnostica.">
  <link rel="stylesheet" href="assets/css/style.css?v=20260615">
</head>

<body data-page="ai" data-required-role="guest">
  <main class="home">
    <header class="topbar" aria-label="Intestazione sito">
      <a class="brand" href="/" aria-label="SYSEM home">
        <img src="assets/img/logo.png" alt="Logo SYSEM">
      </a>
      <div class="nav-container">
        <button class="nav-toggle" id="menu-toggle" aria-label="Apri menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <div class="overlay-menu" id="overlay-menu">
      <nav><ul></ul></nav>
    </div>

    <section class="hero auth-hero" aria-labelledby="page-title">
      <p data-i18n="page.ai.overline">Innovazione</p>
      <h1 id="page-title" data-i18n="page.ai.title">Intelligenza Artificiale</h1>

      <div class="ai-frame">
        <iframe id="ai-iframe" src="https://gianluca-ai-ten.vercel.app" title="Assistente AI SYSEM" allow="clipboard-read; clipboard-write" loading="lazy"></iframe>
      </div>
    </section>
  </main>

  <script src="assets/js/main.js?v=20260615"></script>
  <script>
    (function() {
      var iframe = document.getElementById('ai-iframe');
      if (!iframe) return;
      try {
        var token = localStorage.getItem('sysem_token');
        var userData = JSON.parse(localStorage.getItem('sysem_cached_user') || 'null');
        if (token && userData) {
          var url = new URL(iframe.src);
          url.searchParams.set('token', token);
          url.searchParams.set('email', userData.email);
          iframe.src = url.toString();
        }
      } catch(e) {}
    })();
  </script>
</body>
</html>
