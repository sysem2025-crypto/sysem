<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="page.ai.metaTitle">AI | SYSEM</title>
  <meta name="description" content="Assistente AI SYSEM per supporto tecnico su utility, normative e diagnostica.">
  <link rel="stylesheet" href="assets/css/style.css?v=20260615">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js?v=20260615"></script>
  <script src="assets/js/auth-supabase.js?v=20260615"></script>
</head>

<body data-page="ai" data-required-role="guest">
  <main class="home">
    <header class="topbar" aria-label="Intestazione sito">
      <a class="brand" href="/" aria-label="SYSEM home">
        <img src="assets/img/logo.png" alt="Logo SYSEM">
      </a>
      <div class="nav-container">
        <button class="nav-toggle" id="menu-toggle" aria-label="Apri menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <div class="overlay-menu" id="overlay-menu">
      <nav><ul></ul></nav>
    </div>

    <section class="hero auth-hero" aria-labelledby="page-title">
      <p data-i18n="page.ai.overline">Innovazione</p>
      <h1 id="page-title" data-i18n="page.ai.title">Intelligenza Artificiale</h1>
      <p class="hero-subtitle" data-i18n="page.ai.subtitle">Modalita guest disponibile, login opzionale</p>

      <div class="ai-gate" id="ai-gate">
        <p class="ai-gate-label">Modalita guest</p>
        <p class="ai-gate-copy">
          Puoi usare l'assistente subito. Se accedi con l'account SYSEM, la sessione viene passata
          automaticamente anche all'AI.
        </p>
        <div class="ai-gate-actions">
          <a class="btn-download" href="access.html?return=ai.html">Accedi</a>
          <span class="ai-gate-note">Nessuna registrazione separata</span>
        </div>
      </div>

      <div class="ai-frame" id="ai-frame">
        <iframe id="ai-iframe" data-src="https://gianluca-ai-ten.vercel.app" src="https://gianluca-ai-ten.vercel.app" title="Assistente AI SYSEM" allow="clipboard-read; clipboard-write" loading="lazy"></iframe>
      </div>
    </section>
  </main>

  <script src="assets/js/main.js?v=20260718"></script>
  <script>
    (function() {
      var iframe = document.getElementById('ai-iframe');
      var gate = document.getElementById('ai-gate');
      if (!iframe) return;
      var sb = typeof window.getSupabase === 'function' ? window.getSupabase() : window.supabaseClient;
      if (sb) {
        sb.auth.getSession().then(function(res) {
          if (res.data.session) {
            var url = new URL(iframe.dataset.src || iframe.src, window.location.href);
            url.searchParams.set('token', res.data.session.access_token);
            url.searchParams.set('email', res.data.session.user.email);
            iframe.src = url.toString();
            if (gate) {
              gate.querySelector('.ai-gate-label').textContent = 'Sessione SYSEM attiva';
              gate.querySelector('.ai-gate-copy').textContent = "L'account principale e collegato all'assistente AI.";
            }
          }
        });
      }
    })();
  </script>
</body>
</html>
