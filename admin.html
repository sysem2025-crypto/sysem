<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Accessi | SYSEM</title>
  <meta name="description" content="Gestione ruoli utenti per accesso alla documentazione.">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="admin" data-required-role="admin">
  <main class="home">
    <header class="topbar" aria-label="Intestazione sito">
      <a class="brand" href="/" aria-label="SYSEM home">
        <img src="assets/img/logo.png" alt="Logo SYSEM">
      </a>
      <div class="nav-container">
        <button class="nav-toggle" id="menu-toggle" aria-label="Apri menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <div class="overlay-menu" id="overlay-menu">
      <nav>
        <ul></ul>
      </nav>
    </div>

    <section class="hero admin-hero" aria-labelledby="page-title">
      <p>Controllo accessi</p>
      <h1 id="page-title">Gestione Accessi</h1>

      <div class="admin-panel">
        <div class="admin-toolbar">
          <input id="admin-search" type="search" placeholder="Cerca per email">
          <select id="admin-role-filter">
            <option value="all">Tutti i ruoli</option>
            <option value="base">base</option>
            <option value="pro">pro</option>
            <option value="admin">admin</option>
          </select>
        </div>

        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Email</th>
                <th>Ruolo</th>
                <th>Creato il</th>
                <th>Azione</th>
              </tr>
            </thead>
            <tbody id="admin-users-body"></tbody>
          </table>
        </div>
        <p id="admin-feedback" class="auth-feedback" aria-live="polite"></p>
      </div>
    </section>
  </main>
  <script src="assets/js/main.js"></script>
</body>
</html>
