<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="page.admin.metaTitle">Admin Accessi | SYSEM</title>
  <meta name="description" content="Gestione ruoli utenti per accesso alla documentazione.">
  <link rel="stylesheet" href="assets/css/style.css?v=20260718c">
</head>
<body data-page="admin" data-required-role="admin">
<div class="site">
  <header class="site-header">
    <div class="site-header__left">
      <a class="brand" href="/" aria-label="SYSEM home">
        <img src="assets/img/logo.png" alt="Logo SYSEM">
      </a>
      <span class="site-header__menu" id="menu-label"></span>
    </div>
    <div class="nav-container">
      <button class="nav-toggle" id="menu-toggle" aria-label="Apri menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="site-body">
    <div class="content-frame">
      <div class="page-heading">
        <h1 class="page-title" data-i18n="page.admin.title">Gestione Accessi</h1>
      </div>
      <div class="page-body">
        <div class="admin-panel">
          <div class="admin-toolbar">
            <input id="admin-search" type="search" placeholder="Cerca per email" data-i18n="admin.searchPlaceholder">
            <select id="admin-role-filter">
              <option value="all" data-i18n="admin.allRoles">Tutti i ruoli</option>
              <option value="base">base</option>
              <option value="pro">pro</option>
              <option value="admin">admin</option>
            </select>
          </div>

          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th data-i18n="admin.thEmail">Email</th>
                  <th data-i18n="admin.thRole">Ruolo</th>
                  <th data-i18n="admin.thCreated">Creato il</th>
                  <th data-i18n="admin.thAction">Azione</th>
                </tr>
              </thead>
              <tbody id="admin-users-body"></tbody>
            </table>
          </div>
          <p id="admin-feedback" class="auth-feedback" aria-live="polite"></p>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="changelog-section" aria-label="Registro modifiche">
      <div class="changelog-header">
        <span class="changelog-badge">Modifiche recenti</span>
      </div>
      <div class="changelog-list" id="changelog-list">
        <p class="changelog-loading">Caricamento...</p>
      </div>
    </div>
  </footer>
</div>

<div class="overlay-menu" id="overlay-menu">
  <nav>
    <ul></ul>
  </nav>
</div>

<script src="assets/js/main.js?v=20260718c"></script>
</body>
</html>
