<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="page.home.metaTitle">SYSEM | Soluzioni software per utilities</title>
  <meta name="description" content="SYSEM sviluppa soluzioni software e integrazioni per il settore utilities.">
  <link rel="stylesheet" href="assets/css/style.css?v=20260615">
</head>

<body data-page="home" data-required-role="guest">
  <main class="home">
    <header class="topbar" aria-label="Intestazione sito">
      <a class="brand" href="/" aria-label="SYSEM home">
        <img src="assets/img/logo.png" alt="Logo SYSEM">
      </a>

      <div class="nav-container">
        <button class="nav-toggle" id="menu-toggle" aria-label="Apri menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <div class="overlay-menu" id="overlay-menu">
      <nav><ul></ul></nav>
    </div>

    <section class="hero hero-home" aria-labelledby="page-title">
      <p class="hero-overline" data-i18n="page.home.overline">Studio Tecnico Informatico</p>
      <h1 id="page-title" data-i18n="page.home.title">SYSEM</h1>
      <p class="hero-subtitle" data-i18n="page.home.subtitle">soluzioni digitali per telecontrollo utilities</p>
      <span class="under-construction-badge">Site under construction</span>
    </section>

    <section class="changelog-section" aria-label="Registro modifiche">
      <div class="changelog-header">
        <span class="changelog-badge" id="changelog-badge">Modifiche recenti</span>
      </div>
      <div class="changelog-list" id="changelog-list">
        <p class="changelog-loading">Caricamento...</p>
      </div>
    </section>
  </main>

  <script src="assets/js/main.js?v=20260615"></script>
  <script>
    (function () {
      var list = document.getElementById('changelog-list');
      if (!list) return;
      fetch('changelog.json?v=' + Date.now())
        .then(function (r) { return r.json(); })
        .then(function (entries) {
          var lastThree = entries.slice(-3).reverse();
          list.innerHTML = lastThree.map(function (e) {
            return '<div class="changelog-entry"><time class="changelog-date">' + e.date + '</time><span class="changelog-text">' + e.text + '</span></div>';
          }).join('');
        })
        .catch(function () {
          list.innerHTML = '<p class="changelog-empty">Nessun aggiornamento registrato.</p>';
        });
    })();
  </script>
</body>
</html>
